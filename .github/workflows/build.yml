# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [Release]
        platform: ["AnyCPU"]

    steps:
      - name: Install .Net 4.6.1
        shell: cmd
        run: choco install netfx-4.6.1-devpack -y
        
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Create directories
        shell: cmd
        run: |
          mkdir "${{ github.workspace }}\Bililive_dm\Win32"
          mkdir "${{ github.workspace }}\Bililive_dm\x64"

      - name: Restore NuGet packages
        run: nuget restore Bililive_dm.sln

      - name: Build solution
        run: |
          msbuild Bililive_dm/Bililive_dm.csproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform="${{ matrix.platform }}" `
            /m `
            /v:minimal
